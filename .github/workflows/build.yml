# Verifiable release build — every artifact CircuitOS ships is produced by this public workflow,
# which is a SignPath Foundation requirement (binaries must be built from source in a verifiable way).
# The build is UNSIGNED here; signing happens as a separate manually-approved SignPath step.
name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run smoke tests
        run: dotnet run --project tools/runtime.tests/CircuitOS.Runtime.SmokeTests.csproj -c Release -- data

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Build installer + update packages (unsigned)
        shell: pwsh
        run: ./tools/package/Build-CircuitOSVelopack.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitOS-velopack
          path: dist/velopack/
